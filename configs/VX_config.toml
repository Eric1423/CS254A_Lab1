# =============================================================================
# VX_config.toml - Vortex SGEMM Configuration
# =============================================================================
# Peak = 2 * NUM_THREADS * NUM_FPU_BLOCKS  (flops/cycle per core)
# Goal: achieve >= 50% of peak on single core
# =============================================================================

# --- Hardware parameters (passed as -D flags via CONFIGS) ---
[core]
NUM_THREADS = 4
NUM_WARPS = 4
NUM_FPU_BLOCKS = 1
NUM_ALU_BLOCKS = 1
NUM_LSU_BLOCKS = 1
ISSUE_WIDTH = 1

[cache]
DCACHE_SIZE = 4096
SMEM_SIZE = 4096
L2_ENABLE = false

# --- Simulation parameters (passed as --flags to blackbox.sh) ---
[simulation]
driver = "simx"
cores = 1
clusters = 1
matrix_size = 64
